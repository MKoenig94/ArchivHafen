name: archivhafen

services:
  archivhafen:
    image: archivhafen:local
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${ARCHIVHAFEN_HTTP_PORT:-4174}:4174"
    environment:
      NODE_ENV: production
      ARCHIVHAFEN_HOST: 0.0.0.0
      ARCHIVHAFEN_PORT: "4174"
      ARCHIVHAFEN_DATA_DIR: /data
      ARCHIVHAFEN_SYNC_INTERVAL_MINUTES: "${ARCHIVHAFEN_SYNC_INTERVAL_MINUTES:-15}"
    volumes:
      - archivhafen_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  archivhafen_data:
    name: archivhafen-data
